name: gold-daily
# cập nhật giá vàng từ Telegram mỗi sáng + deploy GitHub Pages
on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC = 08:30 giờ VN (data vàng gửi tối hôm trước ~7PM)
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: gold-pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install telethon openpyxl httpx
      - name: Crawl giá vàng từ Telegram
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python crawl_gold.py
      - name: Build dashboard (đọc bank/market từ Google Sheet nếu có SHEET_ID)
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/build_static.py || python scripts/build_static.py --no-sheet
      - name: Commit data (lưu lịch sử)
        run: |
          git config user.name "gold-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/gold_latest.json data/gold_history.csv data/gold_brands.csv
          git diff --cached --quiet || { git commit -m "chore: cập nhật giá vàng $(date -u +%F)"; git push; }
      - name: Chuẩn bị site cho Pages (index.html)
        run: cp dist/dashboard.html dist/index.html
      - name: Cấu hình Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
