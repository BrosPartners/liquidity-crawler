name: gold-daily
# cập nhật giá vàng từ Telegram mỗi sáng
on:
  schedule:
    - cron: "20 2 * * *"   # 02:20 UTC = 09:20 giờ VN
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install telethon openpyxl httpx
      - name: Crawl giá vàng từ Telegram
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python crawl_gold.py
      - name: Build dashboard (đọc bank/market từ Google Sheet nếu có SHEET_ID)
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python scripts/build_static.py || python scripts/build_static.py --no-sheet
      - name: Commit data + dist
        id: commit
        run: |
          git config user.name "gold-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/gold_latest.json data/gold_history.csv data/gold_brands.csv dist/dashboard.html
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Không có dữ liệu mới — bỏ qua commit."
          else
            git commit -m "chore: cập nhật giá vàng $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # Gói Vercel Hobby + repo private chặn auto-deploy theo tác giả commit,
      # nên gọi Deploy Hook (do chủ dự án tạo) để Vercel deploy bản mới nhất.
      - name: Trigger Vercel deploy (Deploy Hook)
        if: steps.commit.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK" && echo "Đã trigger Vercel deploy."
          else
            echo "Chưa cấu hình secret VERCEL_DEPLOY_HOOK — bỏ qua bước deploy."
          fi
